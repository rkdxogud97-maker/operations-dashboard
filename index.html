};

const STOP = new Set(['일일보고','일일 보고','주간보고','주간 보고','업무보고','업무 보고','오전','오후','특이사항','보고','금일','명일','구분','업무내용','진행사항','비고','날짜','내용']);

// ─── Helpers ──────────────────────────────────────────────────────────────────
function todayMid(){const d=new Date();d.setHours(0,0,0,0);return d;}
function dateFromOffset(n){const d=todayMid();d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);}
function ddayOf(iso){if(!iso)return 0;const t=todayMid();const d=new Date(iso+'T00:00:00');return Math.round((d-t)/86400000);}
function fmtDate(iso){if(!iso)return'';const d=new Date(iso+'T00:00:00');const w=['일','월','화','수','목','금','토'][d.getDay()];return String(d.getMonth()+1).padStart(2,'0')+'.'+String(d.getDate()).padStart(2,'0')+' ('+w+')';}
function ddayLbl(iso){const n=ddayOf(iso);if(n>0)return'D-'+n;if(n===0)return'D-DAY';return'D+'+(- n);}

// Removes date/schedule markers ((~7.3), (~7.2 목), 7.2(목), (7.1 10:00~, 화상회의)) from a task
// name while keeping ordinary parentheticals like (HQ 대체물질). Used for text-paste registration.
function stripDateMarkers(name){
  let out=name;
  // "M.D(요일)" combined marker
  out=out.replace(/\d{1,2}\.\d{1,2}\s*[(（][월화수목금토일][)）]/g,' ');
  // parenthetical date/schedule markers
  out=out.replace(/[(（]([^()（）]*)[)）]/g,(full,inner)=>{
    const hasDate=/\d{1,2}\.\d{1,2}(?!\d)/.test(inner);
    const dateOnly=/^\s*~?\s*\d{1,2}\.\d{1,2}(?!\d)\s*$/.test(inner);
    const marker=dateOnly||(hasDate&&(/~/.test(inner)||/\d{1,2}:\d{2}/.test(inner)||/[월화수목금토일]/.test(inner)));
    if(!marker) return full;
    const cleaned=inner
      .replace(/\d{1,2}:\d{2}/g,'')
      .replace(/\d{1,2}\.\d{1,2}(?!\d)/g,'')
      .replace(/~/g,'')
      .replace(/(^|[\s,])[월화수목금토일](?=[\s,]|$)/g,'$1')
      .replace(/\s*,\s*/g,', ')
      .replace(/,\s*,/g,',')
      .replace(/^[\s,]+|[\s,]+$/g,'')
      .trim();
    return cleaned?'('+cleaned+')':' ';
  });
  // bare tilde-prefixed date "~7.3"
  out=out.replace(/~\s*\d{1,2}\.\d{1,2}(?!\d)/g,' ');
  // stray double quotes (Teams paste often injects unbalanced ")
  out=out.replace(/["“”„‟〝〞＂]/g,'');
  return out.replace(/\s+([)）])/g,'$1').replace(/\s{2,}/g,' ').trim();
}

// ─── Fuzzy duplicate detection ──────────────────────────────────────────────
// Normalize aggressively: drop parenthetical content, keep only alnum + Hangul.
function normName(n){
  return (n||'').replace(/\([^)）]*[)）]/g,'').replace(/[^0-9a-zA-Z가-힣]/g,'').toLowerCase();
}
function editDistance(a,b){
  const m=a.length,n=b.length;
  if(!m) return n; if(!n) return m;
  let prev=new Array(n+1); for(let j=0;j<=n;j++) prev[j]=j;
  for(let i=1;i<=m;i++){
    const cur=[i];
    for(let j=1;j<=n;j++) cur[j]=Math.min(prev[j]+1,cur[j-1]+1,prev[j-1]+(a[i-1]===b[j-1]?0:1));
    prev=cur;
  }
  return prev[n];
}
// True when two task names likely refer to the same task despite minor differences.
function sameTask(a,b){
  const x=normName(a),y=normName(b);
  if(!x||!y) return false;
  if(x===y) return true;
  // Numbers are meaningful discriminators (반응기/공장 번호, 차수) — differing digits ⇒ different task
  const dx=(x.match(/\d+/g)||[]).join(','), dy=(y.match(/\d+/g)||[]).join(',');
  if(dx!==dy) return false;
  const [sh,lo]=x.length<=y.length?[x,y]:[y,x];
  if(sh.length>=6&&lo.indexOf(sh)!==-1) return true; // one contains the other
  const ratio=1-editDistance(x,y)/Math.max(x.length,y.length);
  return ratio>=0.82;
}
function findExisting(name,tasks){ return (tasks||[]).find(t=>sameTask(t.name,name)); }

// Strips undefined values (Firestore rejects undefined)
function cleanDoc(obj){
  const out={};
  for(const [k,v] of Object.entries(obj)){if(v!==undefined) out[k]=v;}
  return out;
}
// Returns task fields safe to write to Firestore (no id, no enriched fields)
function taskToDoc(t){
  const {id:_,...rest}=t;
  return cleanDoc(rest);
}


// ─── Text parser ──────────────────────────────────────────────────────────────
// Handles text pasted from tables/reports where tasks are separated by "N. " prefixes.
// Dates embedded in tasks as "M.D" (e.g. 7.2(목), ~7.2 목, 7.3 14:30~).
function parseReport(text){
  const year=new Date().getFullYear();
  const rows=[];

  // Strip table column headers like "7월 1일(수)", tabs, and stray double quotes
  let s=text
    .replace(/\d{1,2}월\s*\d{1,2}일\s*[(（][월화수목금토일][)）]/g,' ')
    .replace(/\t/g,' ')
    .replace(/["“”„‟〝〞＂]/g,' ');

  // Split into task segments by tracking parenthesis depth.
  // A task separator is digit(s) + "." + whitespace at depth=0,
  // where the digit is NOT preceded by another digit or "." (avoids splitting on dates like 7.2).
  // Key: dates like "7.2" have digit after the dot; task separators like "1. " have space after the dot.
  const segments=[];
  let depth=0,buf='';
  for(let i=0;i<s.length;i++){
    const c=s[i];
    if(c==='('||c==='（'){depth++;buf+=c;continue;}
    if((c===')'||c==='）')&&depth>0){depth--;buf+=c;continue;}
    if(depth===0&&/\d/.test(c)){
      let j=i;
      while(j<s.length&&/\d/.test(s[j]))j++;
      if(j<s.length&&s[j]==='.'&&j+1<s.length&&/\s/.test(s[j+1])){
        const prev=i>0?s[i-1]:'';
        if(!/[\d.]/.test(prev)){
          if(buf.trim()) segments.push(buf.trim());
          buf='';i=j+1;
          while(i<s.length&&/\s/.test(s[i]))i++;
          i--;continue;
        }
      }
    }
    buf+=c;
  }
  if(buf.trim()) segments.push(buf.trim());

  segments.forEach(seg=>{
    seg=seg.replace(/\s+/g,' ').trim();
    if(!seg||seg.length<2) return;
    if(/^\d{1,2}월/.test(seg)) return; // skip header remnants

    // Extract first valid M.D date not followed by another digit
    let dueIso=null;
    const dateRe=/(\d{1,2})\.(\d{1,2})(?!\d)/g;
    let dm;
    while((dm=dateRe.exec(seg))!==null){
      const mm=parseInt(dm[1],10),dd=parseInt(dm[2],10);
      if(mm>=1&&mm<=12&&dd>=1&&dd<=31){
        const d=new Date(year,mm-1,dd);d.setHours(12,0,0,0);
        dueIso=d.toISOString().slice(0,10);break;
      }
    }
    const hasDate=!!dueIso;
    if(!dueIso) dueIso=dateFromOffset(7);

    // Task name with date/schedule markers removed
    const name=stripDateMarkers(seg);
    if(!name||name.length<2) return;

    // Fuzzy dedup within this paste (catches minor wording differences)
    if(rows.some(r=>sameTask(r.name,name))) return;

    rows.push({name,dueIso,hasDate});
  });
  return rows;
}

// ─── AI summary renderer (lightweight markdown: bullets + **bold**) ────────────
function AiSummary({text}){
  return (
    <div style={{display:'flex',flexDirection:'column',gap:7}}>
      {text.split('\n').map((ln,i)=>{
        if(!ln.trim()) return null;
        const numM=ln.match(/^\s*(\d+)\.\s+/);
        const bullet=/^\s*[-*•]\s+/.test(ln);
        const content=ln.replace(/^\s*[-*•]\s+/,'').replace(/^\s*\d+\.\s+/,'');
        const parts=content.split(/(\*\*[^*]+\*\*)/g).filter(Boolean).map((seg,j)=>{
          const m=seg.match(/^\*\*([^*]+)\*\*$/);
          return m?<strong key={j} style={{fontWeight:700,color:'#1C212B'}}>{m[1]}</strong>:<React.Fragment key={j}>{seg}</React.Fragment>;
        });
        const isHead=numM&&/\*\*/.test(ln);
        return (
          <div key={i} style={{display:'flex',gap:8,fontSize:13.5,lineHeight:1.65,color:'#3A4150',marginTop:isHead&&i>0?4:0}}>
            {(bullet||numM)&&<span style={{color:'#FF6B4A',flexShrink:0,fontWeight:700}}>{numM?numM[1]+'.':'•'}</span>}
            <span style={{minWidth:0}}>{parts}</span>
          </div>
        );
      })}
    </div>
  );
}

  function ddayPhrase(iso){
    const n=ddayOf(iso);

  function buildAiContext(){

    const tasks=(s.tasks||[]).filter(t=>!t.done)

`당신은 석유화학 플랜트 운영 엔지니어를 돕는 업무 비서입니다.

아래는 현재 진행 중인 업무와 중장기 프로젝트 마일스톤 목록입니다. (D-숫자는 남은 일수, 지연 D+는 기한 초과)

[업무]
${tasks.length?tasks.join('\n'):'(없음)'}

[마일스톤]

위 목록을 분석해, 한국어로 아래 형식 그대로 간결하게 작성해줘. 서론·설명 없이 형식만.

2. ...

**오늘의 응원**

(표현을 다양화하기 위한 내부 시드: ${nonce} — 이 값은 절대 응답에 포함하지 마세요.)`;
    try{
      const res=await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key='+encodeURIComponent(key),{
        method:'POST',headers:{'Content-Type':'application/json'},

      });
      const data=await res.json();

      if(!out) throw new Error('AI 응답이 비어 있습니다. 잠시 후 다시 시도해 주세요.');

  // ── 캡처 이미지 → Gemini Vision 인식 ────────────────────────────────────────
  function handleCaptureFile(file){
    if(!file){ return; }
    if(!/^image\//.test(file.type||'')){ upd({captureError:'이미지 파일만 인식할 수 있습니다.'}); return; }
    if(!(s.geminiKey||'').trim()){ upd({captureError:'먼저 오늘 보드의 AI 브리핑 섹션에서 Gemini API 키를 등록해 주세요.'}); return; }
    const reader=new FileReader();
    reader.onload=()=>{
      const url=String(reader.result);
      const base64=url.split(',')[1];
      const mime=(url.match(/^data:([^;]+);/)||[])[1]||file.type||'image/png';
      runCaptureOcr(base64,mime,url);
    };
    reader.onerror=()=>upd({captureError:'파일을 읽지 못했습니다.'});
    reader.readAsDataURL(file);
  }
  captureFileRef.current=handleCaptureFile;
  async function runCaptureOcr(base64,mime,previewUrl){
    const key=(s.geminiKey||'').trim();
    upd({captureStep:'loading',captureError:'',capturePreview:previewUrl});
    const year=new Date().getFullYear();
    const prompt=
`이 이미지는 석유화학 운영 엔지니어의 일일/주간 업무 보고 화면 또는 표입니다.
표에 적힌 각 업무를 추출해줘. 규칙:
- "업무명"에서 날짜·기한 표기(예: 7.2(목), ~7.3, 10:00~ 등)는 제외하고 핵심 업무 내용만 남긴다. 단 (사업부), (업체명) 같은 일반 괄호 내용은 유지.
- 날짜는 이미지의 열 제목/표기를 근거로 YYYY-MM-DD 형식. 연도가 없으면 ${year}년으로 간주. 날짜를 알 수 없으면 null.
- 취소선이 그어졌거나 완료 표시된 항목은 done=true, 아니면 false.
- 메모·특이사항이 있으면 memo에, 없으면 빈 문자열.
JSON만 출력. 형식: {"tasks":[{"name":string,"due":"YYYY-MM-DD"|null,"done":boolean,"memo":string}]}`;
    try{
      const res=await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key='+encodeURIComponent(key),{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          contents:[{parts:[{text:prompt},{inlineData:{mimeType:mime,data:base64}}]}],
          generationConfig:{temperature:0.2,maxOutputTokens:2048,thinkingConfig:{thinkingBudget:0},responseMimeType:'application/json'},
        }),
      });
      const data=await res.json();
      if(!res.ok) throw new Error(data&&data.error&&data.error.message?data.error.message:('HTTP '+res.status));
      const parts=(((data.candidates||[])[0]||{}).content||{}).parts||[];
      let out=parts.map(p=>p.text||'').join('').trim().replace(/^```(json)?/i,'').replace(/```$/,'').trim();
      let parsed; try{ parsed=JSON.parse(out); }catch(_){ throw new Error('인식 결과를 해석하지 못했습니다. 다시 시도해 주세요.'); }
      const items=(parsed&&(parsed.tasks||parsed.items))||[];
      if(!items.length){ upd({captureStep:'upload',captureError:'이미지에서 업무를 찾지 못했습니다. 더 선명한 캡처로 다시 시도해 주세요.'}); return; }
      const cand=dedupCandidates();
      const rows=items.map(it=>{
        const name=(it.name||'').trim();
        const hasDue=it.due&&/^\d{4}-\d{2}-\d{2}$/.test(it.due);
        const dueIso=hasDue?it.due:dateFromOffset(7);
        const ex=findExisting(name,cand);
        const status=ex?(ex.done?'완료됨':'중복(갱신)'):'신규';
        return {include:!it.done&&!ex,name,dueIso,done:!!it.done,memo:(it.memo||'').trim(),
          confidence:hasDue?'normal':'low',status,type:'1회성',
          date:hasDue?fmtDate(it.due).slice(0,5):'—'};
      }).filter(r=>r.name);
      if(!rows.length){ upd({captureStep:'upload',captureError:'인식된 업무명이 없습니다.'}); return; }
      upd({captureStep:'preview',captureRows:rows});
    }catch(e){
      upd({captureStep:'upload',captureError:'인식 실패: '+((e&&e.message)||'다시 시도해 주세요.')});
    }
  }

  // ── Enrichment ───────────────────────────────────────────────────────────
  function enrichTask(t){
    const dday=ddayOf(t.due);
    let ddayText,ddayColor,ddayState;
    if(dday>0){ddayText='D-'+dday;ddayColor='#1C212B';ddayState='future';}
    else if(dday===0){ddayText='D-DAY';ddayColor='#FF6B4A';ddayState='today';}
    else{ddayText='D+'+(- dday);ddayColor='#FB3B3B';ddayState='past';}
    const chip=TYPE_CHIP[t.type]||TYPE_CHIP['1회성'];
    const imp=IMP[t.importance]||IMP.mid;
    const ddayBig=s.dDayStyle==='대형숫자';
    const chipLabel=t.type==='N일'?(t.cycle||30)+'일 주기':(TYPE_LABEL[t.type]||t.type);
    return{...t,dday,ddayText,ddayColor,
      chipBg:chip.bg,chipColor:chip.color,chipLabel,
      impColor:imp.c,impLabel:imp.l,
      showProg:(t.type==='1회성'||t.type==='중장기')&&typeof t.progress==='number',
      progPct:(t.progress||0)+'%',progWidth:(t.progress||0)+'%',
      ddayBig,ddayPill:!ddayBig,
      ddayPillBg:ddayState==='past'?'#FFE6E6':ddayState==='today'?'#FFE9E2':'#EFF1F4',
      dateLabel:fmtDate(t.due),
    };
  }
  function enrichProject(p){
    const st=STATUS_C[p.status]||STATUS_C['진행'];
    const cat=CAT_C[p.category]||CAT_C['기타'];
    const thr=s.notifThreshold;
    const milestones=(p.milestones||[]).map(m=>{
      const dday=ddayOf(m.date);
      let tag,tagColor,tagBg,ddayColor,dotBg,dotBorder,dotIcon,nameColor;
      if(m.done){tag='완료';tagColor='#1F8C7A';tagBg='#E3F4F1';ddayColor='#B6BCC6';dotBg='#1F8C7A';dotBorder='none';dotIcon='✓';nameColor='#8A929E';}
      else if(dday<0){tag='지연';tagColor='#FB3B3B';tagBg='#FFE6E6';ddayColor='#FB3B3B';dotBg='#fff';dotBorder='2.5px solid #FB3B3B';dotIcon='';nameColor='#1C212B';}
      else if(dday<=thr){tag='임박';tagColor='#E0532F';tagBg='#FFE9E2';ddayColor='#FF6B4A';dotBg='#fff';dotBorder='2.5px solid #FF6B4A';dotIcon='';nameColor='#1C212B';}
      else{tag='예정';tagColor='#8A929E';tagBg='#EEF0F3';ddayColor='#9AA2AD';dotBg='#fff';dotBorder='2.5px solid #D9DDE3';dotIcon='';nameColor='#1C212B';}
      return{...m,ddayText:ddayLbl(m.date),ddayColor,dateLabel:fmtDate(m.date),tag,tagColor,tagBg,dotBg,dotBorder,dotIcon,nameColor};
    });
    const prog=typeof p.progress==='number'?p.progress:0;
    return{...p,milestones,catBg:cat.bg,catColor:cat.c,statusBg:st.bg,statusColor:st.c,
      progPct:prog+'%',
      donutStyle:`conic-gradient(#FF6B4A ${prog*3.6}deg,#EFF1F4 0deg)`,
      startLabel:p.start?fmtDate(p.start):'—',
      targetLabel:p.target?fmtDate(p.target):'—',
      targetDday:p.target?ddayLbl(p.target):'—',
      scheduleLabel:(p.start?fmtDate(p.start):'—')+' ~ '+(p.target?fmtDate(p.target):'—'),
    };
  }

  // ── Task actions (write to Firestore; UI updates via onSnapshot) ──────────
  function completeTask(id){
    if(!window.__fb) return;
    const {db,doc,setDoc}=window.__fb;
    const repeat={'매주':7,'매월':30,'분기1회':91,'반기1회':182,'연1회':365};
    const t=(s.tasks||[]).find(t=>t.id===id);
    if(!t) return;
    const step=repeat[t.type]||(t.type==='N일'?(t.cycle||30):0);
    if(step>0){
      // 반복 업무: 다음 회차로 이동 (완료 기록 없이 유지)
      const d=new Date(t.due+'T00:00:00');d.setDate(d.getDate()+step);
      setDoc(doc(db,'tasks',id),taskToDoc({...t,due:d.toISOString().slice(0,10)})).catch(console.error);
    } else {
      // 1회성 업무: 삭제하지 않고 완료 처리 + 완료일 기록 (중복 검증·완료 기록용)
      setDoc(doc(db,'tasks',id),taskToDoc({...t,done:true,completedAt:dateFromOffset(0),progress:100})).catch(console.error);
    }
  }
  function reopenTask(id){
    if(!window.__fb) return;
    const {db,doc,setDoc}=window.__fb;
    const t=(s.tasks||[]).find(t=>t.id===id);
    if(!t) return;
    setDoc(doc(db,'tasks',id),taskToDoc({...t,done:false,completedAt:undefined})).catch(console.error);
  }
  function deleteTask(id){
    if(!window.__fb) return;
    const {db,doc,deleteDoc}=window.__fb;
    deleteDoc(doc(db,'tasks',id)).catch(console.error);
    upd({noteOpen:false});
  }
  function openNote(t){ upd({noteOpen:true,noteId:t.id,noteText:t.note||''}); }
  function saveNote(){
    if(!window.__fb) return;
    const {db,doc,setDoc}=window.__fb;
    const t=(s.tasks||[]).find(t=>t.id===s.noteId);
    if(!t){ upd({noteOpen:false}); return; }
    setDoc(doc(db,'tasks',t.id),taskToDoc({...t,note:s.noteText})).catch(console.error);
    upd({noteOpen:false});
  }
  // 중복 검증 대상: 진행 중 업무 + 당월에 완료 처리한 업무
  function dedupCandidates(){
    const now=new Date(); const mk=now.getFullYear()+'-'+(now.getMonth()+1);
    return (s.tasks||[]).filter(t=>{
      if(!t.done) return true;
      if(!t.completedAt) return false;
      const d=new Date(t.completedAt+'T00:00:00');

  }
  function openAddProject(){
    upd({addOpen:true,addTab:'direct',pasteStep:'input',pasteText:'',pasteRows:[],

      msForm:{name:'',date:''}});
  }
  // Build project fields safe for Firestore (no id, no enriched fields)
  function projToDoc(p){
    const {id:_,...rest}=p;
    return cleanDoc(rest);
  }
  function rawProject(id){ return (s.projects||[]).find(p=>p.id===id); }
  function saveProject(){
    if(!window.__fb) return;
    const {db,doc,setDoc}=window.__fb;
    const f=s.addForm;
    if(!f.name.trim()) return;
    setDoc(doc(db,'projects','p'+Date.now()),cleanDoc({
      name:f.name.trim(),
      category:f.category||'기타',
      status:'진행',
      progress:typeof f.progress==='number'?f.progress:0,
      start:f.startIso||dateFromOffset(0),
      target:f.dueIso||dateFromOffset(90),
      milestones:[],
    })).catch(console.error);
    upd({addOpen:false});
  }
  function saveManage(){
    if(!window.__fb) return;
    const {db,doc,setDoc}=window.__fb;
    const p=rawProject(s.manageId); if(!p) return;
    const m=s.manageForm;
    setDoc(doc(db,'projects',p.id),projToDoc({...p,
      progress:m.progress,status:m.status,start:m.startIso,target:m.endIso,
    })).catch(console.error);
    upd({manageOpen:false});
  }
  function writeMilestones(milestones){
    const {db,doc,setDoc}=window.__fb;
    const p=rawProject(s.manageId); if(!p) return;
    setDoc(doc(db,'projects',p.id),projToDoc({...p,milestones})).catch(console.error);
  }
  function addMilestone(){
    if(!window.__fb) return;
    const mf=s.msForm;
    if(!mf.name.trim()||!mf.date) return;
    const p=rawProject(s.manageId); if(!p) return;
    const milestones=[...(p.milestones||[]),{name:mf.name.trim(),date:mf.date,done:false}]
      .sort((a,b)=>(a.date||'').localeCompare(b.date||''));
    writeMilestones(milestones);
    upd({msForm:{name:'',date:''}});
  }
  function toggleMilestone(idx){
    if(!window.__fb) return;
    const p=rawProject(s.manageId); if(!p) return;
    writeMilestones((p.milestones||[]).map((m,i)=>i===idx?{...m,done:!m.done}:m));
  }
  function deleteMilestone(idx){
    if(!window.__fb) return;
    const p=rawProject(s.manageId); if(!p) return;
    writeMilestones((p.milestones||[]).filter((_,i)=>i!==idx));
  }
  function deleteProject(){
    if(!window.__fb) return;
    const {db,doc,deleteDoc}=window.__fb;
    deleteDoc(doc(db,'projects',s.manageId)).catch(console.error);
    upd({manageOpen:false});
  }
  function saveTask(){
    if(!window.__fb) return;
    const {db,doc,setDoc}=window.__fb;
    const f=s.addForm;
    if(!f.name.trim()) return;
    if(f.type==='중장기'&&!f.editingId){ saveProject(); return; }
    const isProg=f.type==='1회성'||f.type==='중장기';
    const body=cleanDoc({
      name:f.name.trim(),
      type:f.type,
      importance:f.importance,
      due:f.dueIso||dateFromOffset(3),
      progress:isProg?f.progress:null,
      done:false,
    });
    setDoc(doc(db,'tasks',f.editingId||('t'+Date.now())),body).catch(console.error);
    upd({addOpen:false});
  }
  function parsePaste(){
    if(!s.pasteText.trim()) return;
    const parsed=parseReport(s.pasteText);
    const cand=dedupCandidates();
    const rows=parsed.map(r=>{
      const ex=findExisting(r.name,cand);
      const status=ex?(ex.done?'완료됨':'중복(갱신)'):'신규';
      return{name:r.name,dueIso:r.dueIso,confidence:r.hasDate?'normal':'low',status,include:!ex,type:'1회성'};
    });
    upd({pasteRows:rows,pasteStep:'preview'});
  }
  function confirmPaste(){
    if(!window.__fb) return;
    const {db,doc,setDoc}=window.__fb;
    const cand=dedupCandidates();
    s.pasteRows.filter(r=>r.include).forEach(r=>{
      const ex=findExisting(r.name,cand);
      if(ex){
        // 사용자가 중복/완료 항목을 직접 선택한 경우: 기한 갱신 + 다시 진행 상태로
        setDoc(doc(db,'tasks',ex.id),taskToDoc({...ex,due:r.dueIso,done:false,completedAt:undefined})).catch(console.error);
      } else {
        setDoc(doc(db,'tasks','t'+Date.now()+Math.random().toString(36).slice(2,6)),
          {name:r.name,type:'1회성',importance:'mid',due:r.dueIso,progress:null,done:false}
        ).catch(console.error);
      }
    });
    upd({addOpen:false});

  function confirmCapture(){
    if(!window.__fb) return;

        if(r.done) setDoc(doc(db,'tasks',ex.id),taskToDoc({...ex,done:true,completedAt:ex.completedAt||dateFromOffset(0),progress:100})).catch(console.error);
        else setDoc(doc(db,'tasks',ex.id),taskToDoc({...ex,due:r.dueIso,done:false,completedAt:undefined})).catch(console.error);

        setDoc(doc(db,'tasks','t'+Date.now()+Math.random().toString(36).slice(2,6)),

  }));
  upcomingMsCol.sort((a,b)=>a._dd-b._dd);
  // 완료 업무 (완료일 내림차순, 완료일별 그룹)
  const completedTasks=(s.tasks||[]).filter(t=>t.done).sort((a,b)=>(b.completedAt||'').localeCompare(a.completedAt||''));
  const completedGroups=[];
  completedTasks.forEach(t=>{
    const k=t.completedAt||'날짜 미상';

  const upcomingMs=[];
  projects.forEach(p=>p.milestones.forEach(m=>{const dd=ddayOf(m.date);if(!m.done&&dd>=0&&dd<=s.notifThreshold) upcomingMs.push({name:m.name,sub:p.name,dday:ddayLbl(m.date),ddayColor:dd===0?'#FF6B4A':'#F0A52A',_dd:dd});}));
  upcomingMs.sort((a,b)=>a._dd-b._dd);
  const notifCount=overdue.length+todayDueList.length+upcomingMs.length;
  const td=new Date();
  const todayLabel=(td.getMonth()+1)+'월 '+td.getDate()+'일';
  const f=s.addForm;
  const mp=s.manageOpen?rawProject(s.manageId):null;
  const noteTask=s.noteOpen?(s.tasks||[]).find(t=>t.id===s.noteId):null;

          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <div style={{width:30,height:30,borderRadius:8,background:'#FF6B4A',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:800,fontSize:16,color:'#fff',flexShrink:0}}>O</div>
            <div style={{fontSize:16,fontWeight:700,letterSpacing:-.2,whiteSpace:'nowrap'}}>운영 대시보드</div>

              </button>

                <>
                  <div onClick={()=>upd({notifOpen:false})} style={{position:'fixed',inset:0,zIndex:45}}/>

                      {[{label:'지난 마감',c:'#FB3B3B',dot:'#FB3B3B',items:overdue,dday:n=>n.dday},{label:'오늘 마감',c:'#E0532F',dot:'#FF6B4A',items:todayDueList,dday:()=>'D-DAY'},{label:'임박 마일스톤',c:'#B5791A',dot:'#F0A52A',items:upcomingMs,dday:n=>n.dday,dc:n=>n.ddayColor}].map(({label,c,dot,items,dday,dc})=>(

                                  <div style={{fontSize:13.5,fontWeight:600,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{n.name}</div>

                                </div>
                                <span style={{fontSize:12.5,fontWeight:700,color:dc?dc(n):dot,whiteSpace:'nowrap'}}>{dday(n)}</span>
                              </div>

                        <button onClick={()=>{const v=!s.desktopNotif;upd({desktopNotif:v});fbSaveSettings({desktopNotif:v});}} style={{position:'relative',width:42,height:24,borderRadius:999,border:'none',cursor:'pointer',background:s.desktopNotif?'#FF6B4A':'#D5D9E0',transition:'background .15s'}}>

                        </div>
                      </div>
                    </div>
                  </div>
                </>

        <div style={{maxWidth:480,margin:'48px auto',padding:'0 24px',textAlign:'center'}}>

      {/* ─── BOARD VIEW ─── */}
      {!isLoading&&s.view==='board'&&(
        <main style={{maxWidth:2120,margin:'0 auto',padding:'28px clamp(20px,4vw,64px) 64px'}}>
          {/* ─── AI 우선순위 브리핑 ─── */}
          <section style={{marginBottom:22,background:'#fff',border:'1px solid #ECEEF1',borderRadius:16,overflow:'hidden',boxShadow:'0 1px 3px rgba(16,18,20,.04),0 10px 28px -18px rgba(16,18,20,.12)'}}>
            <div style={{display:'flex',alignItems:'center',gap:12,padding:'16px 20px',borderBottom:s.aiSummary||s.aiError||s.aiLoading||s.keyEditOpen?'1px solid #F2F3F5':'none'}}>
              <div style={{width:34,height:34,borderRadius:10,flexShrink:0,background:'linear-gradient(135deg,#FF8A6E,#E0532F)',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff'}}>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3l1.9 4.8L18.5 9l-4.6 1.2L12 15l-1.9-4.8L5.5 9l4.6-1.2z"/><path d="M19 15l.8 2.2L22 18l-2.2.8L19 21l-.8-2.2L16 18l2.2-.8z"/></svg>

                <div style={{fontSize:15,fontWeight:700,letterSpacing:-.2}}>AI 우선순위 브리핑</div>
                <div style={{fontSize:12,color:'#8A929E',marginTop:2}}>
                  {s.aiLoading?'분석 중…':s.aiAt?'방금 분석됨 · 진행 업무·마일스톤 기준':'급한 일과 우선순위를 AI가 요약합니다 · Gemini 2.5 Flash'}
                </div>

              {s.geminiKey&&!s.keyEditOpen&&(
                <button onClick={()=>upd({keyEditOpen:true,keyInput:''})} className="btn-light" style={{height:32,padding:'0 11px',borderRadius:8,border:'1px solid #E5E8EC',background:'#fff',color:'#8A929E',fontSize:12,fontWeight:600,cursor:'pointer'}}>API 키 변경</button>

            {s.keyEditOpen&&(

              </div>

              <label style={{display:'block',fontSize:12.5,fontWeight:700,color:'#5B6472',margin:'18px 0 7px'}}>전체 일정</label>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <input type="date" value={s.manageForm.startIso} onChange={e=>upd(p=>({manageForm:{...p.manageForm,startIso:e.target.value}}))} style={{flex:1,height:40,padding:'0 12px',borderRadius:10,border:'1px solid #E1E4E8',fontSize:14,background:'#FAFBFC',cursor:'pointer'}}/>
                <span style={{color:'#A4ABB5',fontWeight:700}}>~</span>
                <input type="date" value={s.manageForm.endIso} onChange={e=>upd(p=>({manageForm:{...p.manageForm,endIso:e.target.value}}))} style={{flex:1,height:40,padding:'0 12px',borderRadius:10,border:'1px solid #E1E4E8',fontSize:14,background:'#FAFBFC',cursor:'pointer'}}/>
              </div>

              {/* Milestones */}
              <div style={{margin:'24px 0 10px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                <div style={{fontSize:11,fontWeight:700,letterSpacing:.5,color:'#B6BCC6'}}>마일스톤 및 기한</div>
                <span style={{fontSize:12,color:'#8A929E',fontWeight:600}}>{(mp.milestones||[]).length}건</span>
              </div>
              <div style={{border:'1px solid #ECEEF1',borderRadius:12,overflow:'hidden'}}>
                {(mp.milestones||[]).length===0&&(
                  <div style={{padding:'18px 14px',textAlign:'center',fontSize:12.5,color:'#A4ABB5'}}>아래에서 마일스톤을 추가하세요.</div>
                )}
                {(mp.milestones||[]).map((m,i)=>(
                  <div key={i} style={{display:'flex',alignItems:'center',gap:11,padding:'10px 12px',borderBottom:'1px solid #F2F3F5'}}>
                    <input type="checkbox" checked={!!m.done} onChange={()=>toggleMilestone(i)} style={{width:17,height:17,accentColor:'#1F8C7A',cursor:'pointer',flexShrink:0}}/>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:13.5,fontWeight:600,color:m.done?'#A4ABB5':'#1C212B',textDecoration:m.done?'line-through':'none',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{m.name}</div>
                      <div style={{fontSize:11.5,color:'#9AA2AD'}}>{fmtDate(m.date)} · {ddayLbl(m.date)}</div>
                    </div>
                    <button onClick={()=>deleteMilestone(i)} aria-label="마일스톤 삭제" className="btn-del" style={{flexShrink:0,width:30,height:30,borderRadius:8,border:'1px solid #E5E8EC',background:'#fff',color:'#A4ABB5',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>
                      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.9" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg>
                    </button>
                  </div>
                ))}
              </div>

              {/* Add milestone */}
              <div style={{marginTop:12,display:'flex',gap:8}}>
                <input value={s.msForm.name} onChange={e=>upd(p=>({msForm:{...p.msForm,name:e.target.value}}))} onKeyDown={e=>{if(e.key==='Enter')addMilestone();}} placeholder="마일스톤명 (예: 설계 검토 완료)" style={{flex:1,height:40,padding:'0 12px',borderRadius:10,border:'1px solid #E1E4E8',fontSize:13.5,background:'#FAFBFC'}}/>
                <input type="date" value={s.msForm.date} onChange={e=>upd(p=>({msForm:{...p.msForm,date:e.target.value}}))} style={{width:150,height:40,padding:'0 10px',borderRadius:10,border:'1px solid #E1E4E8',fontSize:13.5,background:'#FAFBFC',cursor:'pointer'}}/>
                <button onClick={addMilestone} className="btn-coral" style={{flexShrink:0,height:40,padding:'0 16px',borderRadius:10,border:'none',background:s.msForm.name.trim()&&s.msForm.date?'#FF6B4A':'#D5D9E0',color:'#fff',fontSize:13.5,fontWeight:700,cursor:s.msForm.name.trim()&&s.msForm.date?'pointer':'not-allowed',transition:'background .12s'}}>추가</button>
              </div>
            </div>

            <div style={{padding:'16px 26px 22px',borderTop:'1px solid #F0F2F4',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <button onClick={deleteProject} className="btn-del" style={{height:42,padding:'0 16px',borderRadius:10,border:'1px solid #F3CFC4',background:'#fff',color:'#D8472A',fontSize:13.5,fontWeight:600,cursor:'pointer'}}>프로젝트 삭제</button>
              <div style={{display:'flex',gap:10}}>
                <button onClick={()=>upd({manageOpen:false})} style={{height:42,padding:'0 18px',borderRadius:10,border:'1px solid #E1E4E8',background:'#fff',color:'#5B6472',fontSize:14,fontWeight:600,cursor:'pointer'}}>닫기</button>
                <button onClick={saveManage} className="btn-coral" style={{height:42,padding:'0 24px',borderRadius:10,border:'none',background:'#FF6B4A',color:'#fff',fontSize:14,fontWeight:700,cursor:'pointer'}}>저장</button>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* ─── COMPLETED-TASK NOTE MODAL ─── */}
      {s.noteOpen&&noteTask&&(
        <div onClick={()=>upd({noteOpen:false})} style={{position:'fixed',inset:0,zIndex:80,background:'rgba(16,18,20,.42)',display:'flex',alignItems:'center',justifyContent:'center',padding:24,animation:'fade .14s ease'}}>
          <div onClick={e=>e.stopPropagation()} style={{width:520,maxWidth:'100%',maxHeight:'88vh',display:'flex',flexDirection:'column',background:'#fff',borderRadius:18,boxShadow:'0 24px 60px -12px rgba(16,18,20,.4)',animation:'pop .16s ease',overflow:'hidden'}}>
            <div style={{padding:'22px 26px 16px',borderBottom:'1px solid #F0F2F4',display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:14}}>
              <div style={{minWidth:0}}>
                <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:6}}>
                  <span style={{width:18,height:18,borderRadius:'50%',flexShrink:0,background:'#1F8C7A',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:10,fontWeight:700}}>✓</span>
                  <span style={{fontSize:11,fontWeight:700,letterSpacing:.4,color:'#B6BCC6'}}>완료 업무 · {noteTask.completedAt?fmtDate(noteTask.completedAt)+' 완료':'완료'}</span>
                </div>
                <div style={{fontSize:16.5,fontWeight:700,lineHeight:1.35}}>{noteTask.name}</div>
              </div>
              <button onClick={()=>upd({noteOpen:false})} aria-label="닫기" style={{flexShrink:0,width:30,height:30,borderRadius:8,border:'none',background:'#F4F5F7',color:'#8A929E',cursor:'pointer',fontSize:18,lineHeight:1}}>×</button>
            </div>
            <div style={{padding:'18px 26px',overflowY:'auto',flex:1}}>
              <label style={{display:'block',fontSize:12.5,fontWeight:700,color:'#5B6472',marginBottom:8}}>특이사항 · 수행 기록</label>
              <textarea value={s.noteText} onChange={e=>upd({noteText:e.target.value})} autoFocus placeholder="업무 수행 중 발생한 특이사항, 결과, 참고할 내용을 기록하세요." style={{width:'100%',height:180,padding:'13px 14px',borderRadius:12,border:'1px solid #E1E4E8',fontSize:13.5,lineHeight:1.6,background:'#FAFBFC',resize:'vertical'}}/>
            </div>
            <div style={{padding:'16px 26px 22px',borderTop:'1px solid #F0F2F4',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <div style={{display:'flex',gap:8}}>
                <button onClick={()=>{reopenTask(noteTask.id);upd({noteOpen:false});}} className="btn-light" style={{height:42,padding:'0 14px',borderRadius:10,border:'1px solid #E1E4E8',background:'#fff',color:'#5B6472',fontSize:13.5,fontWeight:600,cursor:'pointer'}}>진행으로 되돌리기</button>
                <button onClick={()=>deleteTask(noteTask.id)} className="btn-del" style={{height:42,padding:'0 14px',borderRadius:10,border:'1px solid #F3CFC4',background:'#fff',color:'#D8472A',fontSize:13.5,fontWeight:600,cursor:'pointer'}}>삭제</button>
              </div>
              <button onClick={saveNote} className="btn-coral" style={{height:42,padding:'0 24px',borderRadius:10,border:'none',background:'#FF6B4A',color:'#fff',fontSize:14,fontWeight:700,cursor:'pointer'}}>저장</button>
            </div>
          </div>
        </div>
      )}

      {/* ─── TWEAKS PANEL ─── */}
      <div style={{position:'fixed',bottom:24,right:24,zIndex:40}}>
        <button onClick={()=>upd(p=>({tweaksOpen:!p.tweaksOpen}))} style={{width:44,height:44,borderRadius:12,border:'1px solid #E1E4E8',background:'#fff',boxShadow:'0 4px 14px -4px rgba(16,18,20,.18)',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',color:'#5B6472',transition:'box-shadow .15s'}}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v3M12 20v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M1 12h3M20 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/></svg>
        </button>
        {s.tweaksOpen&&(
          <div style={{position:'absolute',bottom:52,right:0,width:240,background:'#fff',borderRadius:14,boxShadow:'0 12px 32px -8px rgba(16,18,20,.24)',border:'1px solid #ECEEF1',padding:'14px 16px 16px',animation:'pop .14s ease'}}>
            <div style={{fontSize:11,fontWeight:700,letterSpacing:.5,color:'#B6BCC6',marginBottom:12}}>디자인 변형</div>
            {[
              {label:'보드 레이아웃',key:'boardLayout',opts:['4컬럼','오늘강조']},
              {label:'D-day 표현',key:'dDayStyle',opts:['대형숫자','pill배지']},
              {label:'타임라인',key:'timelineStyle',opts:['수직','수평']},
            ].map(({label,key,opts})=>(
              <div key={key} style={{marginBottom:12}}>
                <div style={{fontSize:11.5,fontWeight:600,color:'#8A929E',marginBottom:6}}>{label}</div>
                <div style={{display:'flex',gap:6}}>
                  {opts.map(opt=>{
                    const on=s[key]===opt;
                    return <button key={opt} onClick={()=>upd({[key]:opt})} style={{flex:1,height:32,borderRadius:8,border:`1.5px solid ${on?'#FF6B4A':'#E5E8EC'}`,background:on?'#FFF4F0':'#fff',color:on?'#E0532F':'#5B6472',fontSize:12,fontWeight:700,cursor:'pointer',transition:'all .12s'}}>{opt}</button>;
                  })}
                </div>
              </div>
            ))}
          </div>
        )}
      </div>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
